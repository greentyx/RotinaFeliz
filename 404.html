<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — RotinaFeliz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@400;600;700;800&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="assets/rf.png" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:#4A90D9; --blue-lt:#EAF3FB;
      --green:#5BB974; --bg:#F7F5FF;
      --white:#fff; --ink:#1E1B2E; --muted:#6B6880;
    }
    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg); color: var(--ink);
    }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      position: relative; overflow: hidden;
    }

    /* blobs */
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: .4;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .b1 { width:380px; height:380px; background:#c7dffb; top:-80px; left:-80px; }
    .b2 { width:300px; height:300px; background:#c5f0d0; bottom:-60px; right:-60px; animation-delay:-4s; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }

    .container { position: relative; z-index: 1; max-width: 520px; }

    .error-code {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 900; line-height: 1;
      color: var(--blue); opacity: .15;
      margin-bottom: -20px;
      animation: fadeUp .5s ease both;
    }
    .error-emoji {
      font-size: clamp(4rem, 12vw, 6rem);
      margin-bottom: 16px;
      animation: fadeUp .5s .1s ease both;
      display: block;
    }
    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900; margin-bottom: 14px;
      animation: fadeUp .5s .15s ease both;
    }
    p {
      font-size: 1.05rem; color: var(--muted);
      line-height: 1.7; margin-bottom: 36px;
      animation: fadeUp .5s .2s ease both;
    }

    .actions {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .5s .25s ease both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 1rem;
      cursor: pointer; text-decoration: none;
      transition: transform .18s, box-shadow .18s; border: none;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--blue); color: #fff;
      box-shadow: 0 6px 24px rgba(74,144,217,.35);
    }
    .btn-primary:hover { box-shadow: 0 10px 32px rgba(74,144,217,.45); }
    .btn-outline {
      background: transparent; color: var(--blue);
      border: 2.5px solid var(--blue);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4A90D9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="RotinaFeliz" />
  <link rel="apple-touch-icon" href="/assets/icon-192x192.png" />
  <script src="/js/pwa.js" defer></script>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="container">
  <div class="error-code">404</div>
  <span class="error-emoji">🗺️</span>
  <h1>Ops! Página não encontrada</h1>
  <p>Parece que essa página se perdeu na rotina.<br/>Vamos te levar de volta para um lugar seguro!</p>
  <div class="actions">
    <a href="index.html" class="btn btn-primary">🏠 Ir para o início</a>
    <a href="pages/login.html" class="btn btn-outline">🔑 Fazer login</a>
  </div>
</div>

</body>
</html>
