<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — RotinaFeliz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="/assets/rf.png" type="image/x-icon" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #4A90D9;
      --green:  #5BB974;
      --bg:     #F7F5FF;
      --ink:    #1E1B2E;
      --muted:  #6B6880;
      --card:   #FFFFFF;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(74,144,217,.12);
    }

    .emoji {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: wobble 2.5s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }

    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 12px;
      color: var(--ink);
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 16px rgba(74,144,217,.35);
    }

    .btn-primary:hover { box-shadow: 0 6px 22px rgba(74,144,217,.45); }

    .status {
      margin-top: 24px;
      font-size: .85rem;
      color: var(--muted);
      min-height: 20px;
    }

    .logo {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--blue);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

  <a class="logo" href="/">⭐ RotinaFeliz</a>

  <div class="card">
    <div class="emoji">📡</div>
    <h1>Sem conexão</h1>
    <p>
      Parece que você está sem internet no momento.<br/>
      Verifique sua conexão e tente novamente!
    </p>

    <button class="btn btn-primary" onclick="tentarNovamente()">
      🔄 Tentar novamente
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    function tentarNovamente() {
      const status = document.getElementById('status');
      status.textContent = 'Verificando conexão...';

      setTimeout(() => {
        if (navigator.onLine) {
          status.textContent = '✅ Conexão restaurada! Redirecionando...';
          setTimeout(() => window.location.href = '/', 800);
        } else {
          status.textContent = '❌ Ainda sem internet. Tente em alguns instantes.';
        }
      }, 1000);
    }

    // Redireciona automaticamente quando a conexão voltar
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = '✅ Conexão restaurada! Redirecionando...';
      setTimeout(() => window.location.href = '/', 800);
    });
  </script>

</body>
</html>
